services:
  postgres:
    image: postgres:16-alpine
    container_name: desercion_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-desercion_db}
      POSTGRES_USER: ${POSTGRES_USER:-desercion_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-desercion_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - desercion_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-desercion_user} -d ${POSTGRES_DB:-desercion_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./desercion_api
      dockerfile: Dockerfile
    container_name: desercion_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_PORT:-8182}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-desercion_db}
      DB_USER: ${DB_USER:-desercion_user}
      DB_PASSWORD: ${DB_PASSWORD:-desercion_password}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-3792f5ded446122f59da372c5ea0ce39b72fbfc7c94af4536de0b53c8f94ae03}
      CORS_ORIGINS: "*"
      LOKI_ENDPOINT: http://loki:3100
    ports:
      - "${BACKEND_PORT:-8182}:${BACKEND_PORT:-8182}"
    networks:
      - desercion_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./desercion_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8182
    container_name: desercion_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3020}:3020"
    networks:
      - desercion_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # CENTRALIZED LOGGING STACK
  # ==========================================

  loki:
    image: grafana/loki:3.2.1
    container_name: desercion_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - desercion_net

  promtail:
    image: grafana/promtail:3.2.1
    container_name: desercion_promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - desercion_net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: desercion_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries/'
      - '--web.console.templates=/etc/prometheus/consoles/'
    networks:
      - desercion_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.5.1
    container_name: desercion_grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres:5432
      - GF_DATABASE_USER=${POSTGRES_USER:-desercion_user}
      - GF_DATABASE_PASSWORD=${POSTGRES_PASSWORD:-desercion_password}
      - GF_DATABASE_NAME=${POSTGRES_DB:-desercion_db}
      - GF_SERVER_ROOT_URL=http://localhost:3030
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - postgres
      - loki
      - prometheus
    networks:
      - desercion_net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: desercion_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - desercion_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    container_name: desercion_cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/host/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - desercion_net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  desercion_net:
    driver: bridge
