apiVersion: apps/v1
kind: Deployment
metadata:
  name: desercion-backend
  labels:
    app: desercion-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: desercion-backend
  template:
    metadata:
      labels:
        app: desercion-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine:optimized
          command:
            - sh
            - -c
            - >
              until pg_isready -h postgres -p 5432 -U desercion_user -d desercion_db;
              do
                echo "Esperando a PostgreSQL...";
                sleep 2;
              done
      containers:
        - name: backend
          image: desercion_backend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8182
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: desercion-config
                  key: PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: desercion-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: desercion-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: desercion-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: desercion-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: desercion-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: desercion-secret
                  key: JWT_SECRET_KEY
            - name: JWT_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: desercion-config
                  key: JWT_EXPIRE_MINUTES
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: desercion-config
                  key: CORS_ORIGINS
          readinessProbe:
            httpGet:
              path: /salud
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /salud
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
